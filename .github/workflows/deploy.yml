name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'   # only trigger when backend code changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/wearwise
            git pull origin main
            docker stop wearwise-api || true
            docker rm wearwise-api || true
            docker build -t wearwise-api ./apps/api
            docker run -d \
              --name wearwise-api \
              --env-file ~/wearwise/apps/api/.env \
              -p 8000:8000 \
              wearwise-api
