services:
  db:
    image: postgres:16
    container_name: wearwise-db
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    container_name: wearwise-api
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.dev}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app

  web:
    build: ./apps/web
    container_name: wearwise-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_INTERNAL_BASE_URL: http://api:8000
    env_file:
      - ${APP_ENV_FILE:-.env.dev}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    # develop:
    #   watch:
    #     - action: sync
    #       path: ./web
    #       target: /app/web
    #       ignore:
    #         - node_modules/
    #     - action: sync+restart
    #       path: ./proxy/nginx.conf
    #       target: /etc/nginx/conf.d/default.conf

volumes:
  pgdata:
  web_node_modules:
